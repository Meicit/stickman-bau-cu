<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Giả Lập Bầu Cử 2026</title>
    <style>
        body { margin: 0; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { background: #fdf2e9; border: 8px solid #34495e; box-shadow: 0 10px 30px rgba(0,0,0,0.5); cursor: none; }
        #ui-panel {
            color: white; width: 1000px; display: flex; justify-content: space-between; padding: 20px;
        }
        .step-list { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; width: 300px; }
        .step { color: #95a5a6; margin: 5px 0; transition: 0.3s; }
        .active { color: #f1c40f; font-weight: bold; transform: scale(1.05); }
        .done { color: #2ecc71; text-decoration: line-through; opacity: 0.6; }
        #dialog {
            position: absolute; top: 400px; width: 600px; background: white;
            padding: 15px; border-radius: 10px; border: 3px solid #3498db;
            display: none; text-align: center; font-size: 18px;
        }
    </style>
</head>
<body>

<div id="ui-panel">
    <div>
        <h1 style="margin:0; color: #e74c3c;">BẦU CỬ QUỐC HỘI 2026</h1>
        <p>Di chuyển bằng <b>A - D</b> hoặc <b>Mũi tên</b>. Nhấn <b>SPACE</b> để tương tác.</p>
    </div>
    <div class="step-list">
        <div id="step1" class="step active">1. Xuất trình thẻ cử tri</div>
        <div id="step2" class="step">2. Nhận phiếu bầu</div>
        <div id="step3" class="step">3. Viết phiếu (Buồng kín)</div>
        <div id="step4" class="step">4. Kiểm tra phiếu</div>
        <div id="step5" class="step">5. Bỏ phiếu vào hòm</div>
        <div id="step6" class="step">6. Đóng dấu xác nhận</div>
    </div>
</div>

<div id="dialog"></div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const dialog = document.getElementById('dialog');

canvas.width = 1000;
canvas.height = 500;

// Trạng thái nhân vật
let player = { x: 50, y: 380, speed: 6, frame: 0 };
let currentStep = 1;
let keys = {};

// Định nghĩa các trạm (phòng bầu cử)
const stations = [
    { id: 1, x: 150, name: "BÀN ĐÓN TIẾP", color: "#3498db" },
    { id: 2, x: 300, name: "BÀN PHÁT PHIẾU", color: "#9b59b6" },
    { id: 3, x: 500, name: "BUỒNG KÍN", color: "#f1c40f", type: 'booth' },
    { id: 4, x: 700, name: "BÀN SOÁT PHIẾU", color: "#e67e22" },
    { id: 5, x: 850, name: "HÒM PHIẾU", color: "#e74c3c", type: 'box' },
    { id: 6, x: 950, name: "BÀN ĐÓNG DẤU", color: "#2ecc71" }
];

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

function drawBackground() {
    // Sàn gỗ
    ctx.fillStyle = "#a0522d";
    ctx.fillRect(0, 380, canvas.width, 120);
    ctx.strokeStyle = "#8b4513";
    for(let i=0; i<canvas.width; i+=50) {
        ctx.strokeRect(i, 380, 50, 120);
    }

    // Tranh cổ động trên tường
    ctx.fillStyle = "#c0392b";
    ctx.fillRect(400, 50, 200, 100);
    ctx.fillStyle = "white";
    ctx.font = "bold 16px Arial";
    ctx.textAlign = "center";
    ctx.fillText("BÌNH HƯNG 2026", 500, 90);
    ctx.font = "12px Arial";
    ctx.fillText("NGÀY HỘI TOÀN DÂN", 500, 115);
}

function drawObjects() {
    stations.forEach(s => {
        ctx.textAlign = "center";
        if (s.type === 'booth') {
            // Vẽ buồng kín
            ctx.fillStyle = "#2c3e50";
            ctx.fillRect(s.x - 50, 200, 100, 180);
            ctx.fillStyle = s.color;
            ctx.fillRect(s.x - 45, 205, 90, 175);
        } else if (s.type === 'box') {
            // Vẽ hòm phiếu
            ctx.fillStyle = "#f1c40f";
            ctx.fillRect(s.x - 30, 310, 60, 70);
            ctx.strokeRect(s.x - 30, 310, 60, 70);
            ctx.fillStyle = "black";
            ctx.fillRect(s.x - 15, 315, 30, 5); // Khe bỏ phiếu
        } else {
            // Vẽ bàn làm việc
            ctx.fillStyle = "#bdc3c7";
            ctx.fillRect(s.x - 40, 320, 80, 60);
            ctx.fillStyle = s.color;
            ctx.fillRect(s.x - 45, 315, 90, 10);
        }
        
        ctx.fillStyle = "#2c3e50";
        ctx.font = "bold 12px Arial";
        ctx.fillText(s.name, s.x, 300);
    });
}

function drawStickman(x, y) {
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 4;
    ctx.beginPath();
    // Animation đi bộ đơn giản dựa trên frame
    let walkCycle = Math.sin(player.frame * 0.2) * 10;
    
    // Đầu
    ctx.arc(x, y - 60, 10, 0, Math.PI * 2);
    // Thân
    ctx.moveTo(x, y - 50); ctx.lineTo(x, y - 20);
    // Tay
    ctx.moveTo(x, y - 40); ctx.lineTo(x - 15, y - 30 + walkCycle);
    ctx.moveTo(x, y - 40); ctx.lineTo(x + 15, y - 30 - walkCycle);
    // Chân
    ctx.moveTo(x, y - 20); ctx.lineTo(x - 10 + walkCycle, y);
    ctx.moveTo(x, y - 20); ctx.lineTo(x + 10 - walkCycle, y);
    ctx.stroke();
}

function update() {
    if (keys['ArrowRight'] || keys['KeyD']) {
        player.x += player.speed;
        player.frame++;
    }
    if (keys['ArrowLeft'] || keys['KeyA']) {
        player.x -= player.speed;
        player.frame++;
    }

    // Giới hạn biên
    player.x = Math.max(20, Math.min(980, player.x));

    // Xử lý tương tác
    let inRange = false;
    stations.forEach(s => {
        if (Math.abs(player.x - s.x) < 40) {
            inRange = true;
            if (currentStep === s.id) {
                showDialog(`Nhấn <b>SPACE</b> để ${s.name.toLowerCase()}`);
                if (keys['Space']) {
                    completeStep(s.id);
                }
            } else if (currentStep < s.id) {
                showDialog("Bạn cần hoàn thành bước trước đó!");
            }
        }
    });

    if (!inRange) hideDialog();

    render();
    requestAnimationFrame(update);
}

function completeStep(id) {
    document.getElementById(`step${id}`).className = "step done";
    currentStep++;
    if (currentStep <= 6) {
        document.getElementById(`step${currentStep}`).className = "step active";
        keys['Space'] = false; // Tránh bấm giữ phím
    } else {
        alert("CHÚC MỪNG! Bạn đã hoàn thành nghĩa vụ công dân của mình.");
        location.reload();
    }
}

function showDialog(html) {
    dialog.style.display = "block";
    dialog.style.left = (canvas.offsetLeft + player.x - 300) + "px";
    dialog.innerHTML = html;
}

function hideDialog() {
    dialog.style.display = "none";
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawBackground();
    drawObjects();
    drawStickman(player.x, player.y);
}

update();
</script>
</body>
</html>
